name: Add RCA Comment

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to comment on"
        required: true
        type: string
      comment:
        description: "RCA comment body (markdown supported)"
        required: true
        type: string

jobs:
  add-comment:
    name: Add RCA comment
    runs-on: ubuntu-latest
    steps:
      - name: Unlock, comment, and re-lock
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          COMMENT_BODY: ${{ inputs.comment }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            };

            // Check if issue is locked
            const issue = await github.rest.issues.get(params);
            const wasLocked = issue.data.locked;

            if (wasLocked) {
              await github.rest.issues.unlock(params);
              // Brief pause for GitHub to process the unlock
              await new Promise(r => setTimeout(r, 1000));
            }

            await github.rest.issues.createComment({
              ...params,
              body: process.env.COMMENT_BODY,
            });

            if (wasLocked) {
              await github.rest.issues.lock({
                ...params,
                lock_reason: 'resolved',
              });
            }

            console.log(`Comment added to issue #${issueNumber}`);
