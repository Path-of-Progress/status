owner: Path-of-Progress
repo: status

sites:
  - name: Path of Progress
    url: https://app.pathofprogress.ca/api/health
    expectedStatusCodes:
      - 200
  - name: Website
    url: https://www.pathofprogress.ca
    expectedStatusCodes:
      - 200
      - 301

status-website:
  baseUrl: /status
  logoUrl: https://raw.githubusercontent.com/Path-of-Progress/status/master/assets/logo.png
  favicon: https://raw.githubusercontent.com/Path-of-Progress/status/master/assets/favicon.ico
  name: Path of Progress Status
  theme: dark
  css: ":root { --body-background-color: #161523; --body-text-color: #e2e8f0; --card-background-color: #1e293b; --card-border-color: #334155; --nav-background-color: #1c1b2e; --nav-border-bottom-color: #E5B84B; --nav-current-border-bottom-color: #E5B84B; --up-border-left-color: #22c55e; --up-background-color: #14532d; --down-border-left-color: #ef4444; --down-background-color: #7f1d1d; --degraded-border-left-color: #E5B84B; --degraded-background-color: #713f12; --tag-color: #161523; --tag-up-background-color: #22c55e; --tag-down-background-color: #ef4444; --tag-degraded-background-color: #E5B84B; --change-background-color: #E5B84B; --error-button-border-color: #E5B84B; --error-button-background-color: #E5B84B; --error-button-color: #161523; --submit-button-border-color: #E5B84B; --submit-button-background-color: #E5B84B; --submit-button-color: #161523; --graph-opacity: 1; --graph-filter: hue-rotate(-20deg) saturate(80%); } h1 strong { color: #E5B84B !important; } article { border-left-width: 6px !important; border-radius: 8px !important; } nav a { color: #e2e8f0 !important; } nav a:hover { color: #E5B84B !important; } footer a { color: #E5B84B !important; } main.container { padding: 0 1.5rem; box-sizing: border-box; } article img { max-width: 100%; height: auto; } .live-status article { overflow: hidden; } @media (max-width: 768px) { nav .container { flex-direction: column; gap: 0.5rem; padding: 0.75rem 1rem; } nav .logo { font-size: 0.9rem; } nav .logo img { width: 36px; height: 36px; } nav ul { gap: 0.25rem; flex-wrap: wrap; justify-content: center; } nav ul a { font-size: 0.85rem; padding: 0.25rem 0.5rem; } h1 { font-size: 1.5rem !important; line-height: 1.3; } .lead { font-size: 0.9rem; } .live-status article { flex-direction: column; } .live-status article > div:last-child { width: 100% !important; max-width: 100% !important; height: 120px; } .live-status article > div:first-child { width: 100% !important; } .f.r { gap: 0.15rem; } .f.r label { font-size: 0.8rem; padding: 0.2rem 0.4rem; } h2 { font-size: 1.25rem; } footer { font-size: 0.8rem; padding: 1rem; } } @media (max-width: 480px) { main.container { padding: 0 0.75rem; } h1 { font-size: 1.25rem !important; } nav .logo div { font-size: 0.8rem; } nav .logo img { width: 30px; height: 30px; } }"
  introTitle: "**Path of Progress** service status"
  introMessage: Real-time service monitoring. If you're experiencing issues, check below for current status.
  navbar:
    - title: Status
      href: /
    - title: App
      href: https://app.pathofprogress.ca
    - title: Website
      href: https://www.pathofprogress.ca