      - 200
  - name: Website
    url: https://www.pathofprogress.ca
    expectedStatusCodes:
      - 200
      - 301

status-website:
  baseUrl: /status
  logoUrl: https://raw.githubusercontent.com/Path-of-Progress/status/master/assets/logo.png
  favicon: https://raw.githubusercontent.com/Path-of-Progress/status/master/assets/favicon.ico
  name: Path of Progress Status
  theme: dark
  css: "\n:root {\n  --body-background-color: #1a1209;\n  --body-text-color: #e8dcc8;\n  --card-background-color: #2a1f12;\n  --card-border-color: #5a4230;\n  --nav-background-color: #2a1f12;\n  --nav-border-bottom-color: #5a4230;\n  --nav-current-border-bottom-color: #d4af37;\n  --up-border-left-color: #2e8b57;\n  --up-background-color: #1a3a25;\n  --down-border-left-color: #eb3b5a;\n  --down-background-color: #4a1520;\n  --degraded-border-left-color: #d4af37;\n  --degraded-background-color: #3a2e10;\n  --tag-color: #1a1209;\n  --tag-up-background-color: #2e8b57;\n  --tag-down-background-color: #eb3b5a;\n  --tag-degraded-background-color: #d4af37;\n  --change-background-color: #d4af37;\n  --error-button-border-color: #5a4230;\n  --error-button-background-color: #3b5e99;\n  --error-button-color: #e8dcc8;\n  --submit-button-border-color: #5a4230;\n  --submit-button-background-color: #3b5e99;\n  --submit-button-color: #e8dcc8;\n  --graph-opacity: 1;\n  --graph-filter: sepia(30%) saturate(60%) hue-rotate(-10deg);\n}\nnav { font-family: Georgia, 'Times New Roman', serif !important; }\nh1 strong { color: #d4af37 !important; }\narticle { border-left-width: 6px !important; border-radius: 6px !important; }\nfooter a { color: #d4af37 !important; }\n"
  introTitle: "**Path of Progress** service status"
  introMessage: Real-time service monitoring. If you're experiencing issues, check below for current status.
  navbar:
    - title: Status
      href: /
    - title: App
      href: https://app.pathofprogress.ca