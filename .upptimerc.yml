owner: Path-of-Progress
repo: status

sites:
  - name: Path of Progress
    url: https://app.pathofprogress.ca/api/health
    expectedStatusCodes:
      - 200
  - name: Website
    url: https://www.pathofprogress.ca
    expectedStatusCodes:
      - 200
      - 301

status-website:
  baseUrl: /status
  logoUrl: https://raw.githubusercontent.com/Path-of-Progress/status/master/assets/logo.png
  favicon: https://raw.githubusercontent.com/Path-of-Progress/status/master/assets/favicon.ico
  name: Path of Progress Status
  theme: dark
  css: ":root { --body-background-color: #161523; --body-text-color: #e2e8f0; --card-background-color: #1e293b; --card-border-color: #334155; --nav-background-color: #1c1b2e; --nav-border-bottom-color: #E5B84B; --nav-current-border-bottom-color: #E5B84B; --up-border-left-color: #22c55e; --up-background-color: #14532d; --down-border-left-color: #ef4444; --down-background-color: #7f1d1d; --degraded-border-left-color: #E5B84B; --degraded-background-color: #713f12; --tag-color: #161523; --tag-up-background-color: #22c55e; --tag-down-background-color: #ef4444; --tag-degraded-background-color: #E5B84B; --change-background-color: #E5B84B; --error-button-border-color: #E5B84B; --error-button-background-color: #E5B84B; --error-button-color: #161523; --submit-button-border-color: #E5B84B; --submit-button-background-color: #E5B84B; --submit-button-color: #161523; --graph-opacity: 1; --graph-filter: hue-rotate(-20deg) saturate(80%); } h1 strong { color: #E5B84B !important; } article { border-left-width: 6px !important; border-radius: 8px !important; } nav a { color: #e2e8f0 !important; } nav a:hover { color: #E5B84B !important; } footer a { color: #E5B84B !important; }"
